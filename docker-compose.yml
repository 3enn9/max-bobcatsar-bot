version: "3.9"
services:
  app:
    environment:
      - TZ=Europe/Moscow
    build: .
    env_file:
      - .env
    expose:
      - "8080"
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./.env:/app/.env:ro
    depends_on:
      - app
volumes:
  caddy_data:
  caddy_config:
